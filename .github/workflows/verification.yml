name: CI Verification

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    name: 🛡️ Verify & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 🧶 Install Dependencies
        run: bun install --frozen-lockfile
        env:
            GH_PAT: ${{ secrets.GH_PAT }}

      - name: 🔍 Lint
        run: bun run lint

      - name: 🛡️ Type Check
        run: bun run check

      - name: 🏗️ Build
        run: bun run build
